name: "NZ Power Plans"
version: "1.0.0"
slug: nz_power_plans
description: "NZ electricity plan comparison and cost analysis. Compares HA energy sensors against all current plans from billy.govt.nz including solar export."
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
startup: application
boot: auto
homeassistant_api: true
auth_api: false
ingress: true
ingress_port: 8080
panel_icon: "mdi:flash-outline"
panel_title: "NZ Power Plans"
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "API"
options:
  plan_id: 1
  import_sensor: sensor.energy_import_hourly
  export_sensor: sensor.energy_export_hourly
schema:
  plan_id: int(1)
  import_sensor: str
  export_sensor: str?
